<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <!-- Link CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>My Portfolio</h1>
  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Hello, I'm a PRIYANKAA</h2>
  <p>I build websites and backend systems</p>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I am priyanka  developer skilled in Node.js, MongoDB, and frontend technologies.</p>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>Project 1</h3>
      <p>Portfolio Website</p>
    </div>
    <div class="card">
      <h3>Project 2</h3>
      <p>Backend API</p>
    </div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <form id="contactForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="email" id="email" placeholder="Your Email" required>
    <textarea id="message" placeholder="Your Message" required></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 My Portfolio</p>
</footer>

<!-- Link JS -->
<script src="script.js"></script>

</body>
</html>
